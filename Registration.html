<!DOCTYPE html>
<html>
<head>
    <title>Curiosité Atelier | Registration</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Roboto:wght@300&display=swap" rel="stylesheet">
    <style>
        /* Color variable (same as on the About page) */
        :root {
            --primary: #B0E0E6;
            --accent: #FF6F61;
            --dark: #444;
            --pink: #ffc9e4;
            --blue: #B0E0E6;
            --yellow: #f3df71;
            --purple: #B19CD9;
            --white: #fff;
            --light-bg: rgba(255, 255, 255, 0.85);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, var(--pink), var(--blue));
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            color: var(--dark);
            line-height: 1.6;
        }

        /* Master container style */
        .registration-container {
            width: 100%;
            max-width: 500px;
            background: var(--light-bg);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }

        .registration-container:hover {
            transform: translateY(-5px);
        }

        h2 {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 1.5rem;
            color: var(--dark);
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
        }

        /* Form style */
        .form-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--dark);
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid rgba(176, 224, 230, 0.5);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.8);
            font-family: 'Roboto', sans-serif;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(176, 224, 230, 0.3);
            outline: none;
        }

        /* Register button  */
        .register-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), var(--purple));
            color: white;
            border: none;
            border-radius: 30px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 1rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(177, 156, 217, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .register-btn:hover {
            background: linear-gradient(135deg, var(--purple), var(--accent));
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(255, 111, 97, 0.4);
        }

        .extra-links {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
        }

        .extra-links a {
            color: var(--accent);
            text-decoration: none;
            transition: color 0.3s;
        }

        .extra-links a:hover {
            color: var(--purple);
            text-decoration: underline;
        }

        /* Responsive adjustment */
        @media (max-width: 600px) {
            .registration-container {
                padding: 1.5rem;
            }
            
            h2 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="registration-container">
        <h2>User Registration</h2>
        <form onSubmit="return formValid()">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="Letters & spaces only" required>
            </div>

            <div class="form-group">
                <label for="address">Address</label>
                <input type="text" id="address" name="address" placeholder="Alphanumeric & spaces" required>
            </div>

            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="text" id="phone" name="phone" placeholder="China mobile number" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="user@domain.my/com/net" required>
            </div>

            <div class="form-group">
                <label for="userId">Username</label>
                <input type="text" id="userId" name="userId" placeholder="6+ alphanumeric characters" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="6+ alphanumeric characters" required>
            </div>

            <button type="submit" class="register-btn">Start Shopping</button>
            
            <div class="extra-links">
                Already have an account? <a href="login.html">Sign In</a>
            </div>
        </form>
    </div>

    <script>
        function formValid() {
            // Responsive adjustment
            const name = document.getElementById("name").value;
            const address = document.getElementById("address").value;
            const phone = document.getElementById("phone").value;
            const email = document.getElementById("email").value;
            const userId = document.getElementById("userId").value;
            const password = document.getElementById("password").value;

            // Define regular expression patterns
            const namePattern = /^[a-zA-Z\s]+$/;
            const addressPattern = /^[a-zA-Z0-9\s]+$/;
            const phonePattern = /^1[3-9]\d{9}$/;
            const emailPattern = /^[\w.-]+@[\w.-]+\.(my|com|net)$/;
            const userIdPattern = /^[a-zA-Z0-9]{6,}$/;
            const passwordPattern = /^[a-zA-Z0-9]{6,}$/;

            // Verification name
            if (!namePattern.test(name)) {
                alert("Name can only contain letters and spaces");
                document.getElementById("name").focus();
                return false;
            }

            // Authentication address
            if (!addressPattern.test(address)) {
                alert("Address can only contain letters, numbers and spaces");
                document.getElementById("address").focus();
                return false;
            }

            // Verify phone number
            if (!phonePattern.test(phone)) {
                alert("Please enter a valid China mobile number");
                document.getElementById("phone").focus();
                return false;
            }

            // Verify email address
            if (!emailPattern.test(email)) {
                alert("Email must be valid and end with .my, .com or .net");
                document.getElementById("email").focus();
                return false;
            }

            // Verify user ID
            if (!userIdPattern.test(userId)) {
                alert("Username must contain at least 6 alphanumeric characters");
                document.getElementById("userId").focus();
                return false;
            }

            // Authentication password
            if (!passwordPattern.test(password)) {
                alert("Password must contain at least 6 alphanumeric characters");
                document.getElementById("password").focus();
                return false;
            }

            return true;
        }
    </script>
</body>
</html>
